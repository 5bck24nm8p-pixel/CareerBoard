<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#3f7f8f">
    <meta name="apple-mobile-web-app-title" content="CareerBoard">
    <title>CareerBoard</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-view="tasks">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">CB</div>
          <div>
            <div class="brand-title-row">
              <h1>CareerBoard</h1>
              <button class="settings-button" type="button" id="openSettings" aria-label="設定">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13.5a7.8 7.8 0 0 0 0-3l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2h-4l-.4 3a8 8 0 0 0-2.6 1.5l-2.4-1-2 3.5 2 1.5a7.8 7.8 0 0 0 0 3l-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.6 1.5l.4 3h4l.4-3a8 8 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"></path></svg>
              </button>
            </div>
            <p>就活CRM</p>
          </div>
        </div>

        <nav class="nav" aria-label="メインメニュー">
          <button class="nav-button is-active" type="button" data-view="tasks">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v2h3v16H4V5h3V3Zm2 2v2h6V5H9ZM6 7v12h12V7h-1v2H7V7H6Zm3.3 7.9 5.3-5.3 1.4 1.4-6.7 6.7-3.3-3.3 1.4-1.4 1.9 1.9Z"></path></svg>
            予定
          </button>
          <button class="nav-button" type="button" data-view="companies">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 21V3h10v4h4v14h-6v-4H9v4H5Zm2-2h2v-4h4v4h4V9h-4V5H7v14Zm2-10h2v2H9V9Zm0-3h2v2H9V6Zm4 6h2v2h-2v-2Zm0-3h2v2h-2V9Z"></path></svg>
            企業
          </button>
          <button class="nav-button" type="button" data-view="notes">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h14v18H5V3Zm2 2v14h10V5H7Zm2 3h6v2H9V8Zm0 4h6v2H9v-2Zm0 4h4v2H9v-2Z"></path></svg>
            メモ
          </button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Job Hunting CRM</p>
            <h2 id="viewTitle">予定</h2>
          </div>
          <div class="top-actions" hidden>
            <button class="ghost-button" type="button" id="resetDemo">リセット</button>
          </div>
        </header>

        <section id="companiesView" class="view">
          <section class="summary-band">
            <label class="quick-search">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 0 1 4.8 9.6l4.3 4.3-1.4 1.4-4.3-4.3A6 6 0 1 1 10 4Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path></svg>
              <input id="companySearch" type="search" placeholder="検索">
            </label>
            <button class="primary-button" type="button" id="openCompanyForm">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
              追加
            </button>
          </section>

          <div class="toolbar">
            <label class="compact-field">
              並び替え
              <select id="companySort">
                <option value="priority">志望度順</option>
                <option value="industry">業界別</option>
              </select>
            </label>
          </div>

          <div id="companyGrid" class="company-grid"></div>
        </section>

        <section id="tasksView" class="view is-visible">
          <section class="summary-band task-summary">
            <label class="quick-search">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 0 1 4.8 9.6l4.3 4.3-1.4 1.4-4.3-4.3A6 6 0 1 1 10 4Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path></svg>
              <input id="taskSearch" type="search" placeholder="検索">
            </label>
            <button class="primary-button" type="button" id="openTaskForm">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
              追加
            </button>
          </section>

          <div class="task-layout">
            <section class="panel upcoming-panel">
              <div class="section-head">
                <h3>7日以内</h3>
                <div class="head-actions">
                  <span id="weekTaskCount" class="count-pill">0件</span>
                  <button class="small-button icon-only" type="button" id="openWeekTasks" aria-label="7日以内の予定を一覧で見る">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v2H4V5Zm0 6h16v2H4v-2Zm0 6h16v2H4v-2Z"></path></svg>
                  </button>
                </div>
              </div>
              <div id="weekTaskList" class="task-list compact-task-list"></div>
            </section>

            <section class="panel calendar-panel">
              <div class="section-head calendar-head">
                <button class="icon-button" type="button" id="prevMonth" aria-label="前の月">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15.4 5 1.4 1.4L11.2 12l5.6 5.6-1.4 1.4-7-7 7-7Z"></path></svg>
                </button>
                <div class="calendar-title-group">
                  <h3 id="calendarTitle">カレンダー</h3>
                  <div class="segmented-control" aria-label="カレンダー表示">
                    <button type="button" data-calendar-view="month">月</button>
                    <button type="button" data-calendar-view="week">1週間</button>
                  </div>
                </div>
                <button class="icon-button" type="button" id="nextMonth" aria-label="次の月">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.6 19 7.2 17.6l5.6-5.6-5.6-5.6L8.6 5l7 7-7 7Z"></path></svg>
                </button>
              </div>
              <div class="calendar-weekdays">
                <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
              </div>
              <div id="calendarGrid" class="calendar-grid"></div>
            </section>
          </div>
        </section>

        <section id="notesView" class="view">
          <section class="summary-band task-summary">
            <button class="primary-button" type="button" id="openNoteForm">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
              追加
            </button>
          </section>

          <section class="panel">
            <div class="section-head">
              <h3>メモ</h3>
              <span id="noteCount" class="count-pill">0件</span>
            </div>
            <div class="note-filters">
              <label class="quick-search">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 0 1 4.8 9.6l4.3 4.3-1.4 1.4-4.3-4.3A6 6 0 1 1 10 4Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path></svg>
                <input id="noteSearch" type="search" placeholder="検索">
              </label>
              <label>
                企業
                <select id="noteFilterCompany"></select>
              </label>
              <label>
                種類
                <select id="noteFilterType">
                  <option value="all">すべて</option>
                  <option value="research">企業研究</option>
                  <option value="es">ES</option>
                  <option value="interview">面接</option>
                </select>
              </label>
            </div>
            <div id="noteList" class="note-list"></div>
          </section>
        </section>
      </main>

    </div>

    <div class="modal-backdrop" id="companyModal" aria-hidden="true">
      <section class="task-modal company-modal" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
        <form id="companyForm" class="form-card">
          <div class="composer-head">
            <div>
              <p class="eyebrow">Company</p>
              <h2 id="drawerTitle">企業</h2>
            </div>
            <button class="icon-button" type="button" id="closeCompanyModal" aria-label="閉じる">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
            </button>
          </div>
          <input type="hidden" name="id">
          <label>
            企業
            <input name="name" required placeholder="例: 株式会社サンプル">
          </label>
          <label>
            URL
            <input name="mypageUrl" type="url" placeholder="https://">
          </label>
          <label>
            ID
            <input name="personalId" placeholder="例: MY-2026-001">
          </label>
          <label>
            業界
            <select name="industry" id="industrySelect"></select>
          </label>
          <label>
            志望
            <select name="priority">
              <option value="5">5 とても高い</option>
              <option value="4">4 高い</option>
              <option value="3">3 普通</option>
              <option value="2">2 低め</option>
              <option value="1">1 情報収集中</option>
            </select>
          </label>
          <button class="add-detail-button" type="button" id="toggleSelectionFields" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
            選考
          </button>
          <div class="selection-fields" id="selectionFields" hidden>
            <div class="form-row">
              <label>
                IS開始
                <input name="internStart" type="date">
              </label>
              <label>
                IS終了
                <input name="internEnd" type="date">
              </label>
            </div>
            <label>
              IS
              <select name="internResult">
                <option value="none">未設定</option>
                <option value="pass">インターン合格</option>
                <option value="fail">インターン不合格</option>
              </select>
            </label>
            <label>
              本選考
              <select name="mainResult">
                <option value="none">未設定</option>
                <option value="pass">本選考合格</option>
                <option value="fail">本選考不合格</option>
              </select>
            </label>
          </div>
          <label>
            メモ
            <textarea name="memo" rows="6" placeholder="志望理由、調べたこと、面接で使えそうな情報など"></textarea>
          </label>
          <button class="primary-button full" type="submit">保存</button>
        </form>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div class="modal-backdrop" id="settingsModal" aria-hidden="true">
      <section class="task-modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-panel">
          <div class="composer-head">
            <div>
              <p class="eyebrow">Settings</p>
              <h2 id="settingsTitle">設定</h2>
            </div>
            <button class="icon-button" type="button" id="closeSettings" aria-label="閉じる">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
            </button>
          </div>
          <section class="settings-block">
            <div>
              <h3>書き出し</h3>
              <p>このコードを保存すると、別の端末で復元できます。</p>
            </div>
            <textarea id="exportCode" class="transfer-code" readonly rows="5"></textarea>
            <div class="settings-actions">
              <button class="ghost-button" type="button" id="refreshExportCode">更新</button>
              <button class="primary-button" type="button" id="copyExportCode">コピー</button>
            </div>
          </section>
          <section class="settings-block">
            <div>
              <h3>読込</h3>
              <p>移行コードを貼り付けて読み込みます。</p>
            </div>
            <textarea id="importCode" class="transfer-code" rows="5" placeholder="CAREERBOARD:..."></textarea>
            <button class="primary-button full" type="button" id="importStateCode">読込</button>
          </section>
        </div>
      </section>
    </div>
    <div class="modal-backdrop" id="weekModal" aria-hidden="true">
      <section class="day-modal" role="dialog" aria-modal="true" aria-labelledby="weekModalTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Next 7 Days</p>
            <h2 id="weekModalTitle">7日以内</h2>
          </div>
          <button class="icon-button" type="button" id="closeWeekModal" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
          </button>
        </div>
        <div id="weekModalList" class="day-task-list"></div>
      </section>
    </div>
    <div class="modal-backdrop" id="dayModal" aria-hidden="true">
      <section class="day-modal" role="dialog" aria-modal="true" aria-labelledby="dayModalTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Calendar Tasks</p>
            <h2 id="dayModalTitle">日付のタスク</h2>
          </div>
          <button class="icon-button" type="button" id="closeDayModal" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
          </button>
        </div>
        <div id="dayTaskList" class="day-task-list"></div>
        <button class="primary-button full" type="button" id="useDayForTask">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
          予定追加
        </button>
      </section>
    </div>
    <div class="modal-backdrop" id="taskModal" aria-hidden="true">
      <section class="task-modal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
        <form id="taskForm" class="task-composer">
          <div class="composer-head">
            <div>
              <p class="eyebrow">New Task</p>
              <h2 id="taskModalTitle">予定</h2>
            </div>
            <button class="icon-button" type="button" id="closeTaskModal" aria-label="閉じる">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
            </button>
          </div>
          <div class="task-form-grid">
            <label>
              企業
              <select name="companyId" id="taskCompanySelect" required></select>
            </label>
            <label>
              種類
              <select name="type" id="taskTypeSelect" required></select>
            </label>
            <label>
              日付
              <input name="date" type="date" required>
            </label>
            <label>
              時間
              <input name="time" type="time">
            </label>
            <label class="wide">
              メモ
              <input name="memo" placeholder="例: 10:00 Zoom / ES 400字 / 持ち物確認">
            </label>
          </div>
          <button class="primary-button full" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
            追加
          </button>
        </form>
      </section>
    </div>
    <div class="modal-backdrop" id="noteModal" aria-hidden="true">
      <section class="task-modal" role="dialog" aria-modal="true" aria-labelledby="noteFormTitle">
        <form id="noteForm" class="task-composer">
          <input type="hidden" name="id">
          <div class="composer-head">
            <div>
              <p class="eyebrow">ES / Interview Notes</p>
              <h2 id="noteFormTitle">メモ</h2>
            </div>
            <button class="icon-button" type="button" id="closeNoteModal" aria-label="閉じる">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
            </button>
          </div>
          <div class="note-form-grid">
            <label>
              企業
              <select name="companyId" id="noteCompanySelect" required></select>
            </label>
            <label>
              種類
              <select name="type" required>
                <option value="" disabled selected>種類を選択</option>
                <option value="research">企業研究</option>
                <option value="es">ES</option>
                <option value="interview">面接</option>
              </select>
            </label>
            <label class="wide">
              メモ
              <textarea name="body" rows="7" required placeholder="企業研究メモ、ESで使う材料、面接で話すこと・聞かれた質問など"></textarea>
            </label>
          </div>
          <button class="primary-button full" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
            保存
          </button>
        </form>
      </section>
    </div>
    <div class="modal-backdrop confirm-backdrop" id="confirmModal" aria-hidden="true">
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div>
          <p class="eyebrow">Confirm</p>
          <h2 id="confirmModalTitle">完了？</h2>
          <p id="confirmTaskText" class="confirm-text">一覧から消えます。</p>
        </div>
        <div class="confirm-actions">
          <button class="ghost-button" type="button" id="cancelCompleteTask">キャンセル</button>
          <button class="primary-button" type="button" id="confirmCompleteTask">完了</button>
        </div>
      </section>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
