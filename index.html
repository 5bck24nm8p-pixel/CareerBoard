<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CareerBoard</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">CB</div>
          <div>
            <h1>CareerBoard</h1>
            <p>就活の企業とタスクを管理。</p>
          </div>
        </div>

        <nav class="nav" aria-label="メインメニュー">
          <button class="nav-button is-active" type="button" data-view="companies">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 21V3h10v4h4v14h-6v-4H9v4H5Zm2-2h2v-4h4v4h4V9h-4V5H7v14Zm2-10h2v2H9V9Zm0-3h2v2H9V6Zm4 6h2v2h-2v-2Zm0-3h2v2h-2V9Z"></path></svg>
            企業一覧
          </button>
          <button class="nav-button" type="button" data-view="tasks">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v2h3v16H4V5h3V3Zm2 2v2h6V5H9ZM6 7v12h12V7h-1v2H7V7H6Zm3.3 7.9 5.3-5.3 1.4 1.4-6.7 6.7-3.3-3.3 1.4-1.4 1.9 1.9Z"></path></svg>
            タスク一覧
          </button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Job Hunting CRM</p>
            <h2 id="viewTitle">企業一覧</h2>
          </div>
          <div class="top-actions">
            <button class="ghost-button" type="button" id="resetDemo">デモに戻す</button>
            <button class="primary-button" type="button" id="openCompanyForm">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
              企業を追加
            </button>
          </div>
        </header>

        <section id="companiesView" class="view is-visible">
          <section class="summary-band">
            <div>
              <p class="eyebrow">Companies</p>
              <h3>企業は志望度順に整理。マイページへすぐ移動。</h3>
            </div>
            <label class="quick-search">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 0 1 4.8 9.6l4.3 4.3-1.4 1.4-4.3-4.3A6 6 0 1 1 10 4Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path></svg>
              <input id="companySearch" type="search" placeholder="企業名・業界・メモを検索">
            </label>
          </section>

          <div id="companyGrid" class="company-grid"></div>
        </section>

        <section id="tasksView" class="view">
          <form id="taskForm" class="task-composer">
            <div class="composer-head">
              <div>
                <p class="eyebrow">New Task</p>
                <h3>タスクを追加</h3>
              </div>
              <button class="primary-button" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
                追加
              </button>
            </div>
            <div class="task-form-grid">
              <label>
                企業名
                <select name="companyId" id="taskCompanySelect" required></select>
              </label>
              <label>
                タスク状況
                <select name="type" id="taskTypeSelect" required></select>
              </label>
              <label>
                日程
                <input name="date" type="date" required>
              </label>
              <label>
                時間/締切
                <input name="time" type="time">
              </label>
              <label class="wide">
                メモ
                <input name="memo" placeholder="例: 10:00 Zoom / ES 400字 / 持ち物確認">
              </label>
            </div>
          </form>

          <div class="task-layout">
            <section class="panel">
              <div class="section-head">
                <h3>直近1週間のタスク</h3>
                <span id="weekTaskCount" class="count-pill">0件</span>
              </div>
              <div id="weekTaskList" class="task-list"></div>
            </section>

            <section class="panel">
              <div class="section-head">
                <button class="icon-button" type="button" id="prevMonth" aria-label="前の月">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15.4 5 1.4 1.4L11.2 12l5.6 5.6-1.4 1.4-7-7 7-7Z"></path></svg>
                </button>
                <h3 id="calendarTitle">カレンダー</h3>
                <button class="icon-button" type="button" id="nextMonth" aria-label="次の月">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.6 19 7.2 17.6l5.6-5.6-5.6-5.6L8.6 5l7 7-7 7Z"></path></svg>
                </button>
              </div>
              <div class="calendar-weekdays">
                <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
              </div>
              <div id="calendarGrid" class="calendar-grid"></div>
            </section>
          </div>
        </section>
      </main>

      <aside class="drawer" id="drawer" aria-label="企業追加パネル">
        <div class="section-head">
          <h2 id="drawerTitle">企業を追加</h2>
          <button class="icon-button" type="button" id="closeDrawer" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
          </button>
        </div>

        <form id="companyForm" class="form-card">
          <input type="hidden" name="id">
          <label>
            企業名
            <input name="name" required placeholder="例: 株式会社サンプル">
          </label>
          <label>
            企業マイページURL
            <input name="mypageUrl" type="url" placeholder="https://">
          </label>
          <label>
            業界
            <select name="industry" id="industrySelect"></select>
          </label>
          <label>
            志望度
            <select name="priority">
              <option value="5">5 とても高い</option>
              <option value="4">4 高い</option>
              <option value="3">3 普通</option>
              <option value="2">2 低め</option>
              <option value="1">1 情報収集中</option>
            </select>
          </label>
          <label>
            メモ
            <textarea name="memo" rows="6" placeholder="志望理由、調べたこと、面接で使えそうな情報など"></textarea>
          </label>
          <button class="primary-button full" type="submit">保存する</button>
        </form>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div class="modal-backdrop" id="dayModal" aria-hidden="true">
      <section class="day-modal" role="dialog" aria-modal="true" aria-labelledby="dayModalTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">Calendar Tasks</p>
            <h2 id="dayModalTitle">日付のタスク</h2>
          </div>
          <button class="icon-button" type="button" id="closeDayModal" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"></path></svg>
          </button>
        </div>
        <div id="dayTaskList" class="day-task-list"></div>
        <button class="primary-button full" type="button" id="useDayForTask">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path></svg>
          この日でタスクを追加
        </button>
      </section>
    </div>
    <div class="modal-backdrop confirm-backdrop" id="confirmModal" aria-hidden="true">
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div>
          <p class="eyebrow">Confirm</p>
          <h2 id="confirmModalTitle">タスクを完了にしますか？</h2>
          <p id="confirmTaskText" class="confirm-text">このタスクは直近1週間の一覧から消えます。</p>
        </div>
        <div class="confirm-actions">
          <button class="ghost-button" type="button" id="cancelCompleteTask">キャンセル</button>
          <button class="primary-button" type="button" id="confirmCompleteTask">完了にする</button>
        </div>
      </section>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
